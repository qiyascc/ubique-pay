{% extends "web/base.html" %}
{% block title %}Verify · Ubique Pay{% endblock %}
{% block content %}
<div class="panel" style="max-width:420px;margin:24px auto">
  <h1>Enter code</h1>
  <p class="muted">Sent to {{ phone }}. <a href="{% url 'web:login' %}">Change number</a></p>
  <form method="post">
    {% csrf_token %}
    {% for f in form %}
      <label>{{ f.label }}</label>{{ f }}
      {% for e in f.errors %}<div class="errornote">{{ e }}</div>{% endfor %}
    {% endfor %}
    <div style="margin-top:16px"><button class="btn" type="submit">Verify &amp; continue</button></div>
  </form>
</div>
{% endblock %}
