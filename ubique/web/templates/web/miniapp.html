{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ubique Pay</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@2/dist/tonconnect-ui.min.js"></script>
  <link rel="stylesheet" href="{% static 'miniapp.css' %}">
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">Ubique<b> Pay</b></div>
      <div class="muted" id="who">guest</div>
    </header>

    <div id="status" class="status">Connecting…</div>

    <!-- KYC -->
    <section id="kyc" class="card hidden">
      <h2>Verify your identity</h2>
      <p class="muted">Required before sending money.</p>
      <button class="btn" id="kyc-btn">Verify (demo)</button>
    </section>

    <!-- Wallet -->
    <section id="wallet" class="card hidden">
      <div id="ton-connect"></div>
      <div id="cards"></div>
      <button class="btn ghost" id="addcard-btn">+ Add demo card</button>
    </section>

    <!-- Send -->
    <section id="send" class="card hidden">
      <h2>Send money</h2>
      <label>Recipient card (last 4)</label>
      <input id="r-last4" inputmode="numeric" maxlength="4" placeholder="9999">
      <div class="row">
        <div><label>Amount</label><input id="amount" inputmode="decimal" placeholder="200"></div>
        <div><label>From</label>
          <select id="from-ccy"><option>USD</option><option>EUR</option><option>AZN</option><option>TRY</option></select></div>
        <div><label>To</label>
          <select id="to-ccy"><option>AZN</option><option>TRY</option><option>EUR</option><option>USD</option></select></div>
      </div>
      <button class="btn ghost" id="quote-btn">Get quote</button>
      <div id="quote" class="quote hidden"></div>
      <button class="btn hidden" id="confirm-btn">Confirm &amp; send</button>
    </section>

    <!-- Result -->
    <section id="result" class="card hidden"></section>
  </div>
  <script src="{% static 'miniapp.js' %}"></script>
</body>
</html>
