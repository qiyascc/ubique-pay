name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-please-do-not-use-in-production-0123456789
      DJANGO_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Lint (ruff)
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r ubique config -ll

      - name: Django checks
        run: python manage.py check

      - name: Tests
        run: python manage.py test --verbosity 2

      - name: Dependency audit (pip-audit)
        run: pip-audit || true   # report-only; don't fail the build on upstream advisories
